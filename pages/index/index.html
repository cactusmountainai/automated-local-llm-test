<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lane Smith | Portfolio</title>
    <link href="../../styles/output.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/a8cc471b41.js" crossorigin="anonymous"></script>
    <style>
      /* Hero section gradient animation */
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      .hero-gradient {
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient-shift 15s ease infinite;
      }
      
      /* Smooth fade-in animation for hero content */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .animate-fade-up {
        animation: fadeUp 1s ease-out forwards;
      }
      
      .animate-delay-1 {
        animation-delay: 0.2s;
      }
      
      .animate-delay-2 {
        animation-delay: 0.4s;
      }
    </style>
  </head>

  <body class="dark:bg-gray-900 bg-slate-50 overflow-x-hidden">
    <!-- Navbar -->
    <nav class="dark:bg-gray-900 w-full flex flex-col sm:flex-row flex-wrap items-center justify-between mx-auto p-5">
      <button id="theme-toggle" type="button" class="text-blue-700 hover:scale-125 duration-100 rounded-lg text-sm p-2 mb-4 flex">
        <span class="p-1 font-bold">Dark</span>
        <i class="h-8 w-8 fa-regular fa-moon fa-2xs" style="color: #1a56db"></i>
      </button>
    </nav>

    <!-- Hero Section -->
    <section class="hero-gradient min-h-screen flex items-center justify-center text-center px-4 py-20">
      <div class="max-w-4xl mx-auto">
        <!-- Lane Smith's Name -->
        <h1 class="animate-fade-up text-5xl sm:text-6xl md:text-7xl font-bold text-white mb-6">
          Lane Smith
        </h1>
        
        <!-- Tagline -->
        <p class="animate-fade-up animate-delay-1 text-2xl sm:text-3xl font-light text-white/90 mb-8">
          <span class="text-yellow-300">&lt;</span>
          Creative Developer
          <span class="text-yellow-300">&gt;</span>
        </p>
        
        <!-- Professional Introduction -->
        <p class="animate-fade-up animate-delay-2 text-lg sm:text-xl text-white/80 max-w-2xl mx-auto leading-relaxed">
          Passionate about crafting beautiful, accessible, and performant web experiences. 
          Specializing in modern frontend technologies, responsive design, and user-centered development.
        </p>
        
        <!-- CTA Buttons -->
        <div class="animate-fade-up animate-delay-2 mt-12 flex flex-col sm:flex-row gap-4 justify-center">
          <a href="#projects" class="bg-white text-gray-900 px-8 py-3 rounded-full font-semibold hover:bg-gray-100 transition duration-300 shadow-lg">
            View Projects
          </a>
          <a href="#contact" class="bg-transparent border-2 border-white text-white px-8 py-3 rounded-full font-semibold hover:bg-white/10 transition duration-300">
            Get in Touch
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
